<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Dark Theme Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f11"/>
      <stop offset="100%" stop-color="#050506"/>
    </linearGradient>
    
    <!-- Premium Crimson-to-Rose Gradient -->
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3b30"/>
      <stop offset="60%" stop-color="#d42020"/>
      <stop offset="100%" stop-color="#9e1616"/>
    </linearGradient>

    <!-- Subtle Drop Shadow for elements -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background App Icon Frame (Solid Dark) -->
  <rect width="128" height="128" rx="34" fill="url(#bg-grad)"/>

  <!-- Semi-translucent inner tint for Glassmorphic effect -->
  <path d="M 48,24 H 80 C 93,24 104,35 104,48 V 72 C 104,85 93,96 80,96 H 58 L 40,110 V 96 H 48 C 35,96 24,85 24,72 V 48 C 24,35 35,24 48,24 Z" 
        fill="url(#glow-grad)" 
        opacity="0.08"/>

  <!-- Outer Speech Bubble Glow Outline -->
  <path d="M 48,24 H 80 C 93,24 104,35 104,48 V 72 C 104,85 93,96 80,96 H 58 L 40,110 V 96 H 48 C 35,96 24,85 24,72 V 48 C 24,35 35,24 48,24 Z" 
        fill="none" 
        stroke="url(#glow-grad)" 
        stroke-width="5.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <!-- Inner Brain-Wave Monogram "M" (representing Mind & Hemispheres) -->
  <path d="M 46,70 V 54 C 46,43 55,43 59,50 L 64,57 L 69,50 C 73,43 82,43 82,54 V 70" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#shadow)"/>

  <!-- Neural Sparks / Connections -->
  <circle cx="64" cy="57" r="3" fill="#ffffff" />
  <circle cx="53.5" cy="46" r="2" fill="#ffffff" opacity="0.9" />
  <circle cx="74.5" cy="46" r="2" fill="#ffffff" opacity="0.9" />
</svg>
